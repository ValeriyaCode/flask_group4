<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello</title>
</head>
<body>
  <!--
  with  для створення змінної
  get_flashed_messages() - повертає всі flash-повідомлення
  -->

  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}
      <strong> {{ msg }} </strong>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <label for="user_name">Your name: </label>
    <input name='name' type="text" id="user_name">
    <button type="submit">Send</button>
  </form>
</body>
</html>
