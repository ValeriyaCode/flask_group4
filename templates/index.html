<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search</title>
</head>
<body>
  <h3>Search: </h3>

  <!-- дані відправляються "публічно" -->
  <form method="GET">
    <input name="search" type="text" placeholder="Type your request">
    <button type="submit">Find</button>
  </form>

  <p>You find: {{ user_request }}</p>

  <!-- дані відправляються "приватно" -->
  <form method="POST">
    <label for="user_password" >Password:</label>
    <input name="password" type="password" id="user_password">

    <button type="submit">Save</button>
  </form>

</body>
</html>
